<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAU E-Campus Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <img th:src="@{/images/logo.png}" alt="DAU Logo" />
        </div>

        <h1>Welcome To DAU E-Campus</h1>

        <div th:if="${param.error}" class="alert alert-error">
          Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
          You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
          <div class="form-group">
            <label for="username">Username / Email</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your credential"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>

            <div class="password-input-wrap">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />

              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Show password"
              >
                👁
              </button>
            </div>
          </div>

          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="login-links">
          <a th:href="@{/forgot-password}">Forgot Password</a>
          <a href="#">Need Help?</a>
        </div>
      </div>

      <div class="page-footer">
        © 2025 Dhirubhai Ambani University. All rights reserved.
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const passwordToggle = document.getElementById("passwordToggle");

      passwordToggle.addEventListener("click", function () {
        const isPasswordHidden = passwordInput.type === "password";

        passwordInput.type = isPasswordHidden ? "text" : "password";
        passwordToggle.textContent = isPasswordHidden ? "🙈" : "👁";
        passwordToggle.setAttribute(
          "aria-label",
          isPasswordHidden ? "Hide password" : "Show password",
        );
      });
    </script>
  </body>
</html>
