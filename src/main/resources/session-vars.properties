# Server-side session variable definition for the current logged-in user.
# The browser should receive only the session cookie/id. User data remains on
# the server inside the HttpSession / Spring Session.

# Fields copied from the users table into the server-side current-user session.
ecampus.session.user.attributes=uid,univid,stdid,uname,ufullname,urole0,uemail

# Source table/columns for the session user object.
ecampus.session.user.source-table=ec2.users
ecampus.session.user.uid-column=uid
ecampus.session.user.univ-id-column=univid
ecampus.session.user.student-id-column=stdid
ecampus.session.user.username-column=uname
ecampus.session.user.full-name-column=ufullname
ecampus.session.user.primary-role-column=urole_0
ecampus.session.user.email-column=uemail

# Session policy notes.
ecampus.session.storage=server-side
ecampus.session.client-cookie=session-id-only

